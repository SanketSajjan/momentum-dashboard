<!DOCTYPE html>
<html>
<head>
  <title>Momentum Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Nifty LargeMidcap 250 Momentum Dashboard</h1>

    <p id="updateTime"></p>

    <h2>Top 20 Momentum Stocks</h2>

    <table>
      <thead>
        <tr>
          <th>Stock</th>
          <th>3M Return</th>
          <th>6M Return</th>
          <th>12M Return</th>
          <th>Momentum Score</th>
        </tr>
      </thead>

      <tbody id="top20Table"></tbody>
    </table>

    <h2>Top 10 Portfolio</h2>

    <table>
      <thead>
        <tr>
          <th>Stock</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Investment</th>
          <th>Momentum Score</th>
        </tr>
      </thead>

      <tbody id="portfolioTable"></tbody>
    </table>

  </div>

  <script src="script.js"></script>

</body>
</html>
