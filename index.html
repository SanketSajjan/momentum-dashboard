<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty 50 | Live Market Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #08080a;
            color: #f1f1f3;
        }

        .stock-card {
            background: #111114;
            border: 1px solid #1d1d21;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dynamic Glow Effects */
        .glow-up { box-shadow: 0 0 25px -5px rgba(34, 197, 94, 0.4); border-color: rgba(34, 197, 94, 0.5); }
        .glow-down { box-shadow: 0 0 25px -5px rgba(239, 68, 68, 0.4); border-color: rgba(239, 68, 68, 0.5); }
        .glow-flat { box-shadow: 0 0 25px -5px rgba(234, 179, 8, 0.4); border-color: rgba(234, 179, 8, 0.5); }

        .news-scroll::-webkit-scrollbar { width: 2px; }
        .news-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-12">

    <header class="max-w-7xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tight">NIFTY <span class="text-emerald-500">50</span> PULSE</h1>
            <p class="text-zinc-500 font-medium">Live NSE Data via 0xramm API</p>
        </div>
        <div id="market-status" class="bg-zinc-900 px-4 py-2 rounded-full border border-zinc-800 text-xs font-mono text-zinc-400">
            CONNECTING TO NSE...
        </div>
    </header>

    <div id="dashboard" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Stock Cards injected here -->
    </div>

    <script>
        // API Base URL from the GitHub Documentation
        const BASE_URL = 'https://indian-stock-market-api2.vercel.app';
        
        // Selected Nifty 50 Heavyweights
        const STOCKS = [
            { symbol: 'RELIANCE.NS', name: 'Reliance Industries' },
            { symbol: 'HDFCBANK.NS', name: 'HDFC Bank' },
            { symbol: 'ICICIBANK.NS', name: 'ICICI Bank' },
            { symbol: 'INFY.NS', name: 'Infosys' },
            { symbol: 'TCS.NS', name: 'TCS' },
            { symbol: 'ITC.NS', name: 'ITC Limited' },
            { symbol: 'BHARTIARTL.NS', name: 'Bharti Airtel' }
        ];

        async function getStockData(symbol) {
            try {
                const response = await fetch(`${BASE_URL}/stock?symbol=${symbol}&res=num`);
                return await response.json();
            } catch (e) {
                return null;
            }
        }

        function getVisuals(current, open) {
            if (current > open) return { color: 'text-green-500', icon: 'arrow-up-right', glow: 'glow-up' };
            if (current < open) return { color: 'text-red-500', icon: 'arrow-down-right', glow: 'glow-down' };
            return { color: 'text-yellow-500', icon: 'move-horizontal', glow: 'glow-flat' };
        }

        async function updateDashboard() {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            
            document.getElementById('market-status').innerText = `LAST REFRESH: ${new Date().toLocaleTimeString()}`;

            for (const item of STOCKS) {
                const data = await getStockData(item.symbol);
                if (!data) continue;

                const current = data.price || 0;
                const open = data.open || current;
                const visual = getVisuals(current, open);

                const card = document.createElement('div');
                card.className = `stock-card rounded-3xl p-6 flex flex-col gap-6 ${visual.glow}`;
                
                card.innerHTML = `
                    <!-- Header: Name, Symbol, Logo -->
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center p-1 overflow-hidden shadow-inner">
                            <img src="https://logo.clearbit.com/${item.name.split(' ')[0].toLowerCase()}.com" 
                                 onerror="this.src='https://ui-avatars.com/api/?name=${item.symbol}&background=27272a&color=fff'">
                        </div>
                        <div>
                            <h2 class="font-bold text-lg truncate w-32 md:w-40">${item.name}</h2>
                            <p class="text-xs font-mono text-zinc-500">${item.symbol}</p>
                        </div>
                    </div>

                    <!-- Price Info -->
                    <div class="flex justify-between items-end border-b border-zinc-800 pb-6">
                        <div>
                            <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-1">Live Price</p>
                            <div class="text-3xl font-black flex items-center gap-2 ${visual.color}">
                                <i data-lucide="${visual.icon}" class="w-6 h-6"></i>
                                ₹${current.toLocaleString('en-IN')}
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-1">Open</p>
                            <p class="text-lg font-semibold text-zinc-300">₹${open.toLocaleString('en-IN')}</p>
                        </div>
                    </div>

                    <!-- Bottom Section: News and Consensus -->
                    <div class="grid grid-cols-2 gap-4">
                        <!-- News (Left) -->
                        <div class="space-y-2">
                            <h3 class="text-[10px] uppercase font-bold text-zinc-600 tracking-wider">Market News</h3>
                            <div class="news-scroll overflow-y-auto max-h-32 space-y-3 pr-2">
                                <a href="#" class="block text-[11px] leading-relaxed hover:text-blue-400 text-zinc-400 underline decoration-zinc-800">Quarterly growth exceeds NSE projections...</a>
                                <a href="#" class="block text-[11px] leading-relaxed hover:text-blue-400 text-zinc-400 underline decoration-zinc-800">Sector outlook remains positive for fiscal year...</a>
                                <a href="#" class="block text-[11px] leading-relaxed hover:text-blue-400 text-zinc-400 underline decoration-zinc-800">New regulatory framework discussed...</a>
                                <a href="#" class="block text-[11px] leading-relaxed hover:text-blue-400 text-zinc-400 underline decoration-zinc-800">Dividend announcement expected next week...</a>
                                <a href="#" class="block text-[11px] leading-relaxed hover:text-blue-400 text-zinc-400 underline decoration-zinc-800">Institutional investors increase holdings...</a>
                            </div>
                        </div>

                        <!-- Consensus (Right Stacked) -->
                        <div class="bg-zinc-950/50 rounded-2xl p-3 border border-zinc-800/50">
                            <h3 class="text-[10px] uppercase font-bold text-zinc-600 tracking-wider mb-3">Analyst View</h3>
                            <div class="flex flex-col gap-2">
                                <div class="flex justify-between items-center bg-green-500/10 p-2 rounded-lg">
                                    <span class="text-[10px] font-bold text-green-500">BUY</span>
                                    <span class="text-xs font-black text-green-400">14</span>
                                </div>
                                <div class="flex justify-between items-center bg-zinc-800/50 p-2 rounded-lg">
                                    <span class="text-[10px] font-bold text-zinc-400">HOLD</span>
                                    <span class="text-xs font-black text-zinc-300">5</span>
                                </div>
                                <div class="flex justify-between items-center bg-red-500/10 p-2 rounded-lg">
                                    <span class="text-[10px] font-bold text-red-500">SELL</span>
                                    <span class="text-xs font-black text-red-400">2</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
            lucide.createIcons();
        }

        // Run on load
        updateDashboard();
        // Refresh every 2 minutes
        setInterval(updateDashboard, 120000);
    </script>
</body>
</html>
